[build]
  command = "bash scripts/netlify_build.sh production"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.124.0"
  PYTHON_VERSION = "3.12"

# Cache data directory between builds for faster deployments

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - allow our own scripts and Plotly CDN
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.plot.ly; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.energyzero.nl; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets with validation (JS, CSS, fonts, images)
# Note: Removed 'immutable' to allow browser revalidation on updates
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"  # 1 day with revalidation

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"  # 1 day with revalidation

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"  # 1 year

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"  # 30 days

# Cache data files for shorter time (they update daily)
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"  # 1 hour (data updates daily, but allow some caching)

# Compression for all text-based assets
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = false  # We're using ES6 modules
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[context.production]
  command = "bash scripts/netlify_build.sh production '--baseURL $DEPLOY_PRIME_URL'"

[context.deploy-preview]
  command = "bash scripts/netlify_build.sh preview '--baseURL $DEPLOY_PRIME_URL --buildDrafts'"

[context.branch-deploy]
  command = "bash scripts/netlify_build.sh branch '--baseURL $DEPLOY_PRIME_URL'"

# Redirect rules (optional - add if needed)
# [[redirects]]
#   from = "/old-path"
#   to = "/new-path"
#   status = 301

# Environment-specific settings
[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview.environment]
  HUGO_ENV = "preview"

[context.branch-deploy.environment]
  HUGO_ENV = "branch"
