baseURL = 'https://augur.yourdomain.com'
languageCode = 'en-us'
title = 'Augur'

[params]
  description = "Energy price forecasting platform for the Netherlands"
  author = "Jeroen Veen"
  
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[server]
  [[server.headers]]
    for = "/data/**"
    [server.headers.values]
      Access-Control-Allow-Origin = "*"